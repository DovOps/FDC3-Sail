name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  ci:
    runs-on: ubuntu-latest
    # setup-node cache: npm persists/restores npm cache via the Actions cache API
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier
        run: npm run format

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: |
          npm run build -w @finos/sail-desktop-agent \
            -w @finos/sail-platform-api \
            -w @finos/sail-ui \
            -w @finos/sail-web \
            -w @finos/sail-conformance-harness \
            -w @finos/sail-server

      - name: Build docs site
        run: npm run docs:build

      - name: Test (Vitest)
        run: npm test -- --run

      - name: Test (Cucumber)
        run: npm run test:cucumber -w @finos/sail-desktop-agent
